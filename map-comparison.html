<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Style Comparison — Creator Roster</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #F7F0E8;
    --bg-secondary: #FFF9F4;
    --accent: #C8907E;
    --text-primary: #4E3D36;
    --text-secondary: #7D6B63;
    --lavender: #BBA7CF;
    --sage: #9BB5A0;
    --rose: #D4A0A0;
    --mocha: #A67F72;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 40px 20px 10px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* === Filter bar === */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 20px 20px 8px;
    max-width: 900px;
    margin: 0 auto;
  }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid rgba(78, 61, 54, 0.15);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* === Grid of maps === */
  .map-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 24px;
    padding: 24px 32px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .map-card {
    background: var(--bg-secondary);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(78, 61, 54, 0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    position: relative;
  }
  .map-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(78, 61, 54, 0.14);
  }
  .map-card.current {
    outline: 2.5px solid var(--accent);
    outline-offset: -1px;
  }
  .map-card.current::after {
    content: 'CURRENT';
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 1000;
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 10px;
  }

  .map-container {
    height: 280px;
    width: 100%;
    position: relative;
  }

  .map-info {
    padding: 16px 20px;
  }
  .map-info h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: 1.15rem;
    margin-bottom: 4px;
  }
  .map-info .provider {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .map-info .vibe {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 10px;
    margin-right: 4px;
    margin-bottom: 4px;
  }
  .vibe-warm    { background: #f3e5dc; color: var(--mocha); }
  .vibe-cool    { background: #e4e9f0; color: #5a6b80; }
  .vibe-dark    { background: #3a3535; color: #ccc; }
  .vibe-artistic{ background: #ede4f3; color: #7d5fa0; }
  .vibe-clean   { background: #e2f0e5; color: #4a7a54; }
  .vibe-bold    { background: #f9e2e2; color: #a65c5c; }
  .vibe-earthy  { background: #eae4d5; color: #7d6b4e; }

  .map-info .desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.45;
    margin-top: 8px;
  }

  /* Sepia filter for the "current" card */
  .filter-sepia .leaflet-tile {
    filter: sepia(18%) brightness(0.90) saturate(0.85) contrast(1.05);
  }
  /* Warm filter option */
  .filter-warm .leaflet-tile {
    filter: sepia(25%) brightness(0.95) saturate(0.90) hue-rotate(-5deg);
  }
  /* Ethereal glow */
  .filter-ethereal .leaflet-tile {
    filter: brightness(1.05) saturate(0.7) contrast(0.92) hue-rotate(10deg);
  }
  /* Vintage */
  .filter-vintage .leaflet-tile {
    filter: sepia(35%) brightness(0.88) contrast(1.1) saturate(0.75);
  }

  .hidden { display: none !important; }

  /* Fake avatar markers */
  .avatar-marker {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2.5px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    background-size: cover;
    background-position: center;
  }
</style>
</head>
<body>

<header>
  <h1>Map Style Explorer</h1>
  <p>Compare tile providers to find the perfect vibe for your creator roster. Each map shows the same sample creators so you can see how markers look on each style.</p>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-filter="all">All Styles</button>
  <button class="filter-btn" data-filter="dark">Dark</button>
  <button class="filter-btn" data-filter="light">Light</button>
  <button class="filter-btn" data-filter="artistic">Artistic</button>
  <button class="filter-btn" data-filter="satellite">Satellite</button>
</div>

<div class="map-grid" id="mapGrid"></div>

<script>
// Sample creator locations for demo markers
const sampleCreators = [
  { name: 'Mia', lat: 47.61, lng: -122.33, photo: 'https://i.pravatar.cc/80?img=1' },
  { name: 'Jordan', lat: 34.05, lng: -118.24, photo: 'https://i.pravatar.cc/80?img=2' },
  { name: 'Alex', lat: 40.71, lng: -74.00, photo: 'https://i.pravatar.cc/80?img=3' },
  { name: 'Sage', lat: 29.76, lng: -95.37, photo: 'https://i.pravatar.cc/80?img=4' },
  { name: 'Luna', lat: 41.88, lng: -87.63, photo: 'https://i.pravatar.cc/80?img=5' },
  { name: 'Kai', lat: 25.76, lng: -80.19, photo: 'https://i.pravatar.cc/80?img=6' },
];

const mapStyles = [
  {
    id: 'current',
    name: 'CartoDB Dark + Warm Sepia',
    provider: 'CARTO',
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    attribution: '© OpenStreetMap © CARTO',
    filterClass: 'filter-sepia',
    category: 'dark',
    vibes: [{ label: 'Warm', cls: 'vibe-warm' }, { label: 'Dark', cls: 'vibe-dark' }],
    desc: 'Your current style. Dark base with a cozy sepia filter that matches the lo-fi aesthetic.',
    current: true
  },
  {
    id: 'stamen-watercolor',
    name: 'Stamen Watercolor',
    provider: 'Stadia Maps (Stamen)',
    url: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
    attribution: '© Stamen Design © OpenStreetMap',
    filterClass: '',
    category: 'artistic',
    vibes: [{ label: 'Artistic', cls: 'vibe-artistic' }, { label: 'Warm', cls: 'vibe-warm' }],
    desc: 'Hand-painted watercolor effect. Gorgeous and unique — feels like an illustrated travel journal. Very on-brand for cozy girl.'
  },
  {
    id: 'stamen-toner-lite',
    name: 'Stamen Toner Lite',
    provider: 'Stadia Maps (Stamen)',
    url: 'https://tiles.stadiamaps.com/tiles/stamen_toner_lite/{z}/{x}/{y}{r}.png',
    attribution: '© Stamen Design © OpenStreetMap',
    filterClass: 'filter-warm',
    category: 'light',
    vibes: [{ label: 'Clean', cls: 'vibe-clean' }, { label: 'Bold', cls: 'vibe-bold' }],
    desc: 'Minimalist black & white with a warm overlay. Lets your colored creator avatars pop beautifully against a quiet background.'
  },
  {
    id: 'carto-voyager',
    name: 'CartoDB Voyager',
    provider: 'CARTO',
    url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    attribution: '© OpenStreetMap © CARTO',
    filterClass: 'filter-warm',
    category: 'light',
    vibes: [{ label: 'Clean', cls: 'vibe-clean' }, { label: 'Warm', cls: 'vibe-warm' }],
    desc: 'Modern and airy with soft labels and subtle coloring. Feels premium without being busy — great for a professional roster tool.'
  },
  {
    id: 'alidade-smooth-dark',
    name: 'Alidade Smooth Dark',
    provider: 'Stadia Maps',
    url: 'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',
    attribution: '© Stadia Maps © OpenStreetMap',
    filterClass: '',
    category: 'dark',
    vibes: [{ label: 'Dark', cls: 'vibe-dark' }, { label: 'Cool', cls: 'vibe-cool' }],
    desc: 'Sleek, modern dark map with smooth gradients. More polished than CartoDB dark — great if you want a slightly more refined night-mode feel.'
  },
  {
    id: 'alidade-smooth',
    name: 'Alidade Smooth',
    provider: 'Stadia Maps',
    url: 'https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png',
    attribution: '© Stadia Maps © OpenStreetMap',
    filterClass: 'filter-warm',
    category: 'light',
    vibes: [{ label: 'Clean', cls: 'vibe-clean' }, { label: 'Earthy', cls: 'vibe-earthy' }],
    desc: 'Ultra-clean light map with muted tones. With the warm filter it becomes a beautiful parchment-like background for your roster.'
  },
  {
    id: 'stamen-terrain',
    name: 'Stamen Terrain',
    provider: 'Stadia Maps (Stamen)',
    url: 'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png',
    attribution: '© Stamen Design © OpenStreetMap',
    filterClass: '',
    category: 'artistic',
    vibes: [{ label: 'Earthy', cls: 'vibe-earthy' }, { label: 'Artistic', cls: 'vibe-artistic' }],
    desc: 'Topographic map with elevation shading and natural colors. Mountains, valleys, and coastlines come alive — perfect for adventure/travel creator niches.'
  },
  {
    id: 'esri-imagery',
    name: 'Esri World Imagery',
    provider: 'Esri',
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attribution: '© Esri',
    filterClass: '',
    category: 'satellite',
    vibes: [{ label: 'Bold', cls: 'vibe-bold' }, { label: 'Cool', cls: 'vibe-cool' }],
    desc: 'Real satellite photography. Dramatic and immersive — gives a "zooming in from space" feeling when flying to a creator\'s location.'
  },
  {
    id: 'esri-imagery-warm',
    name: 'Esri Imagery + Vintage Filter',
    provider: 'Esri',
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    attribution: '© Esri',
    filterClass: 'filter-vintage',
    category: 'satellite',
    vibes: [{ label: 'Warm', cls: 'vibe-warm' }, { label: 'Artistic', cls: 'vibe-artistic' }],
    desc: 'Satellite imagery with a vintage sepia filter. Like looking at the world through an old Polaroid — very cozy-girl aesthetic.'
  },
  {
    id: 'carto-dark-nolabel',
    name: 'CartoDB Dark (No Labels)',
    provider: 'CARTO',
    url: 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
    attribution: '© OpenStreetMap © CARTO',
    filterClass: '',
    category: 'dark',
    vibes: [{ label: 'Dark', cls: 'vibe-dark' }, { label: 'Clean', cls: 'vibe-clean' }],
    desc: 'Pure dark silhouette with no text labels at all. Maximum visual focus on your creator markers — dramatically clean and editorial.'
  },
  {
    id: 'osm-topo',
    name: 'OpenTopoMap',
    provider: 'OpenTopoMap',
    url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    attribution: '© OpenTopoMap © OpenStreetMap',
    filterClass: 'filter-ethereal',
    category: 'artistic',
    vibes: [{ label: 'Earthy', cls: 'vibe-earthy' }, { label: 'Cool', cls: 'vibe-cool' }],
    desc: 'Detailed topographic map with contour lines and an ethereal glow filter. Gives a dreamy, National Geographic journal vibe.'
  },
  {
    id: 'carto-positron',
    name: 'CartoDB Positron',
    provider: 'CARTO',
    url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    attribution: '© OpenStreetMap © CARTO',
    filterClass: 'filter-warm',
    category: 'light',
    vibes: [{ label: 'Clean', cls: 'vibe-clean' }, { label: 'Warm', cls: 'vibe-warm' }],
    desc: 'The lightest, most minimal option. With a warm filter it becomes an elegant off-white canvas that matches your app\'s palette perfectly.'
  }
];

const grid = document.getElementById('mapGrid');
const maps = [];

function buildCards(filter) {
  grid.innerHTML = '';
  maps.length = 0;

  const filtered = filter === 'all' ? mapStyles : mapStyles.filter(s => s.category === filter);

  filtered.forEach((style, i) => {
    const card = document.createElement('div');
    card.className = `map-card ${style.current ? 'current' : ''}`;
    card.innerHTML = `
      <div class="map-container ${style.filterClass}" id="map-${style.id}"></div>
      <div class="map-info">
        <h3>${style.name}</h3>
        <div class="provider">${style.provider} · Free tier</div>
        <div>${style.vibes.map(v => `<span class="vibe ${v.cls}">${v.label}</span>`).join('')}</div>
        <div class="desc">${style.desc}</div>
      </div>
    `;
    grid.appendChild(card);

    // Init map after DOM insertion
    requestAnimationFrame(() => {
      const m = L.map(`map-${style.id}`, {
        center: [38, -97],
        zoom: 4,
        zoomControl: false,
        attributionControl: false,
        dragging: true,
        scrollWheelZoom: false
      });

      L.tileLayer(style.url, {
        attribution: style.attribution,
        maxZoom: 18,
        noWrap: true
      }).addTo(m);

      // Add sample creator avatars
      sampleCreators.forEach(c => {
        const icon = L.divIcon({
          className: '',
          html: `<div class="avatar-marker" style="background-image:url('${c.photo}')"></div>`,
          iconSize: [36, 36],
          iconAnchor: [18, 18]
        });
        L.marker([c.lat, c.lng], { icon }).addTo(m);
      });

      maps.push(m);
    });
  });
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    buildCards(btn.dataset.filter);
  });
});

// Initial build
buildCards('all');
</script>
</body>
</html>
